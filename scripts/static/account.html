<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WireBoard · Account &amp; sites</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <header>
      <img src="https://wireboard.io/img/logo-blue.png" alt="WireBoard" />
      <h1>Account &amp; sites</h1>
      <span class="crumb"><a href="/">all examples</a></span>
    </header>

    <p class="muted">Hits <code>/api/account</code> and <code>/api/sites</code> on this Flask server, which calls <code>wb.account()</code> and <code>wb.sites()</code> with the Python SDK.</p>

    <h2>Account</h2>
    <div class="card" id="account"><span class="muted">loading…</span></div>

    <h2>Sites</h2>
    <table id="sites"><tbody><tr><td class="muted">loading…</td></tr></tbody></table>

    <script>
      function esc(s) {
        return String(s == null ? '' : s).replace(/[&<>"']/g, (c) =>
          ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]),
        );
      }
      async function fetchJson(url) {
        const r = await fetch(url);
        if (!r.ok) {
          const body = await r.json().catch(() => ({}));
          throw new Error(body.error || `${r.status} ${r.statusText}`);
        }
        return r.json();
      }
      (async () => {
        try {
          const account = await fetchJson('/api/account');
          document.getElementById('account').innerHTML =
            `<b>${esc(account.name)}</b> &lt;${esc(account.email)}&gt; ` +
            `<span class="muted">— abilities: ${esc(account.abilities.join(', '))}</span>`;

          const { sites } = await fetchJson('/api/sites');
          const rows = sites.map((s) => `
            <tr>
              <td><code>${esc(s.id)}</code></td>
              <td>${esc(s.domain)}</td>
              <td>${s.max_30d == null ? '—' : esc(s.max_30d)}</td>
            </tr>`).join('');
          document.getElementById('sites').innerHTML =
            '<thead><tr><th>id</th><th>domain</th><th>max 30d</th></tr></thead><tbody>' + rows + '</tbody>';
        } catch (err) {
          document.body.insertAdjacentHTML(
            'beforeend',
            `<p class="error">${esc(err.message)}</p>`,
          );
        }
      })();
    </script>
  </body>
</html>
